# Configuration for cargo-deny
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Targets to check dependencies for
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]
# Unmaintained crate advisories (workspace deps only)
unmaintained = "workspace"
# Yanked crate detection
yanked = "warn"
# A list of advisory IDs to ignore (useful for false positives)
ignore = [
    # owning_ref — transitive via ssi → json-ld; no fix available, ssi needs replacement
    { id = "RUSTSEC-2022-0040", reason = "transitive dep via ssi crate, no safe upgrade" },
    # pyo3 0.22.x → 0.24.x is a breaking change requiring PyO3 migration
    { id = "RUSTSEC-2025-0020", reason = "PyO3 0.22→0.24 breaking change; tracked for next major upgrade" },
    # rsa Marvin attack — both 0.6.1 (ssi-jwk) and 0.9.9 (cms); no patched version
    { id = "RUSTSEC-2023-0071", reason = "no safe upgrade available; transitive via ssi and cms crates" },
]

[licenses]
# Licensing confidence threshold (0.0 - 1.0)
confidence-threshold = 0.8
# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
]
# List of explicitly denied licenses — use exceptions for crate-specific overrides
# deny list replaced by allow-list-only approach in cargo-deny 0.18+
# Copyleft licenses — handled by allow list (anything not in allow is denied)
# Allow 1 or more licenses on a per-crate basis
exceptions = [
    # ring uses a custom license that is permissive but not OSI approved
    { allow = ["OpenSSL", "ISC"], name = "ring" },
    # webpki-roots uses MPL-2.0 which is weak copyleft but commonly used for Mozilla projects
    { allow = ["MPL-2.0"], name = "webpki-roots" },
]

[bans]
# Warn on multiple versions of the same crate
multiple-versions = "warn"
# Skip dependencies that do not have a version number
wildcards = "allow"
# List of crates that are allowed to have multiple versions
skip = []
# List of explicitly denied crates
deny = []

[sources]
# Warn if a crate is from an unknown registry
unknown-registry = "warn"
# Warn if a crate is from a git repository
unknown-git = "warn"
# List of allowed git sources
allow-git = []
