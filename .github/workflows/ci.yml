name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Require reproducible release sources
        shell: bash
        run: |
          test -f Cargo.lock
          test -f marty-test-wallet/Cargo.toml
          cargo metadata --locked --no-deps --format-version 1 >/dev/null

      - name: Run tests (workspace, excluding native extension crates)
        run: cargo test --locked --workspace --exclude marty-zkp --exclude marty-bindings --features test-fixtures

      - name: Run binding tests without extension-module linking
        run: cargo test --locked -p marty-bindings --no-default-features

      - name: Run marty-zkp tests (ZK mock)
        env:
          USE_ZK_MOCK: "1"
        run: cargo test --locked -p marty-zkp

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    env:
      USE_ZK_MOCK: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --locked --workspace --features test-fixtures -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Cache cargo-audit
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit &> /dev/null; then
            cargo install cargo-audit --locked
          fi

      - name: Run cargo-audit
        continue-on-error: true
        run: cargo audit

      - name: Cache cargo-deny
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny

      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny &> /dev/null; then
            cargo install cargo-deny --locked
          fi

      - name: Run cargo-deny
        continue-on-error: true
        run: cargo deny check

  python-security:
    name: Python Security (marty-biometrics)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marty-biometrics
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] safety

      - name: Run bandit
        continue-on-error: true
        run: bandit -r python/marty_biometrics/

      - name: Run safety check
        continue-on-error: true
        run: safety check

  feature-matrix:
    name: Feature Matrix (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - marty-crypto
          - marty-secure-storage
          - marty-bindings
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Test no default features
        run: cargo test --locked -p ${{ matrix.crate }} --no-default-features

      - name: Test default features
        run: cargo test --locked -p ${{ matrix.crate }}

  feature-matrix-verification:
    name: Feature Matrix (marty-verification)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Build no default features
        run: cargo build --locked -p marty-verification --no-default-features

      - name: Build with default features
        run: cargo build --locked -p marty-verification

      - name: Run tests with fixtures
        run: cargo test --locked -p marty-verification --features test-fixtures

  feature-matrix-oid4vci:
    name: Feature Matrix (marty-oid4vci)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Check no default features
        run: cargo check --locked -p marty-oid4vci --no-default-features

      - name: Test default features
        run: cargo test --locked -p marty-oid4vci

      - name: Check issuer role alone
        run: cargo check --locked -p marty-oid4vci --no-default-features --features issuer

      - name: Check verifier role alone
        run: cargo check --locked -p marty-oid4vci --no-default-features --features verifier

  feature-combinations:
    name: Feature Combinations
    runs-on: ubuntu-latest
    env:
      MATRIX_CARGO_TARGET_DIR: target/feature-matrix
      USE_ZK_MOCK: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Run critical feature combinations
        run: bash ./scripts/test-feature-combinations.sh

  python-test:
    name: Python Tests (marty-biometrics)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: marty-biometrics
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Create virtualenv and install dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin[patchelf] pytest

      - name: Create virtualenv and install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          .venv\Scripts\activate.bat
          pip install maturin pytest
        shell: cmd

      - name: Build Python package (Unix)
        if: runner.os != 'Windows'
        run: |
          source .venv/bin/activate
          maturin develop --features python

      - name: Build Python package (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv\Scripts\activate.bat
          maturin develop --features python
        shell: cmd

      - name: Run Python tests (Unix)
        if: runner.os != 'Windows'
        run: |
          source .venv/bin/activate
          pytest python/tests/

      - name: Run Python tests (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv\Scripts\activate.bat
          pytest python\tests\
        shell: cmd

  wasm-test:
    name: WASM Tests (marty-biometrics)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marty-biometrics
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (web target)
        run: wasm-pack build --target web --features wasm

      - name: Build WASM (nodejs target)
        run: wasm-pack build --target nodejs --features wasm

      - name: Build WASM (bundler target)
        run: wasm-pack build --target bundler --features wasm
