name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace --features test-fixtures

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --workspace --features test-fixtures -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: Run cargo-audit
        run: cargo audit --deny warnings

      - name: Cache cargo-deny
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-deny
          key: ${{ runner.os }}-cargo-deny

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked || true

      - name: Run cargo-deny
        run: cargo deny check

  python-security:
    name: Python Security (marty-biometrics)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marty-biometrics
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml] safety

      - name: Run bandit
        run: bandit -r python/marty_biometrics/ -f json -o bandit-report.json || bandit -r python/marty_biometrics/

      - name: Run safety check
        run: safety check --json || safety check

  feature-matrix:
    name: Feature Matrix (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - marty-crypto
          - marty-secure-storage
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Test no default features
        run: cargo test -p ${{ matrix.crate }} --no-default-features

      - name: Test default features
        run: cargo test -p ${{ matrix.crate }}

  feature-matrix-verification:
    name: Feature Matrix (marty-verification)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build no default features
        run: cargo build -p marty-verification --no-default-features

      - name: Build with default features
        run: cargo build -p marty-verification

      - name: Run tests with fixtures
        run: cargo test -p marty-verification --features test-fixtures

  python-test:
    name: Python Tests (marty-biometrics)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: marty-biometrics
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv and install dependencies (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin[patchelf] pytest

      - name: Create virtualenv and install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m venv .venv
          .venv\Scripts\activate.bat
          pip install maturin pytest
        shell: cmd

      - name: Build Python package (Unix)
        if: runner.os != 'Windows'
        run: |
          source .venv/bin/activate
          maturin develop --features python

      - name: Build Python package (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv\Scripts\activate.bat
          maturin develop --features python
        shell: cmd

      - name: Run Python tests (Unix)
        if: runner.os != 'Windows'
        run: |
          source .venv/bin/activate
          pytest python/tests/

      - name: Run Python tests (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv\Scripts\activate.bat
          pytest python\tests\
        shell: cmd

  wasm-test:
    name: WASM Tests (marty-biometrics)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marty-biometrics
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (web target)
        run: wasm-pack build --target web --features wasm

      - name: Build WASM (nodejs target)
        run: wasm-pack build --target nodejs --features wasm

      - name: Build WASM (bundler target)
        run: wasm-pack build --target bundler --features wasm
