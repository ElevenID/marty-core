name: MIP Release Wallet

on:
  push:
    branches: [main, "release/**", "agent/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-wallet:
    name: Final-Spec OID4VCI And Browser Wallet
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Require reproducible release sources
        shell: bash
        run: |
          test -f Cargo.lock
          test -f marty-test-wallet/Cargo.toml
          cargo metadata --locked --no-deps --format-version 1 >/dev/null

      - name: Test final-spec protocol engine and browser wallet
        run: cargo test --locked -p marty-oid4vci -p marty-test-wallet

      - name: Check Python bindings against the same protocol engine
        run: cargo check --locked -p marty-bindings
